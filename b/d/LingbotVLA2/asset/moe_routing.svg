<line x1="560" y1="270" x2="200" y2="360" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<rect x="280" y="340" width="600" height="140" fill="#fff" stroke="#ddd" rx="8"/>
<text x="300" y="370" font-family="DejaVu Sans,Arial,sans-serif" font-size="13" fill="#222">s_j = Sigmoid(uᵀ e_j)     (affinity; not softmax)</text>
<text x="300" y="392" font-family="DejaVu Sans,Arial,sans-serif" font-size="13" fill="#222">R(u) = TopK(s_j + b_j, K)  (selection uses bias)</text>
<text x="300" y="414" font-family="DejaVu Sans,Arial,sans-serif" font-size="13" fill="#222">g_j = s_j / Σ_{k∈R} s_k     (weights ignore bias)</text>
<text x="300" y="436" font-family="DejaVu Sans,Arial,sans-serif" font-size="13" fill="#222">b_j ← b_j − γ · sign(n_j − mean n)   (loss-free LB)</text>
<text x="300" y="458" font-family="DejaVu Sans,Arial,sans-serif" font-size="13" fill="#222">m(u) = E^(s)(u) + λ Σ_{j∈R} g_j E_j^(r)(u)</text>
