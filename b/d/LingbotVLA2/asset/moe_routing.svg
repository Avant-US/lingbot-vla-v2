<line x1="400" y1="120" x2="460" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<line x1="400" y1="145" x2="460" y2="180" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
